# NPI Container Audit Rules
# Add new rules here without touching Python code.
# See tasks/container_template_audit/AUDIT_RULES_README.md for full guide.

rules:

  # NOTE: duplicate_template, missing_location, missing_product_type and
  # missing_order_type are DISABLED — the built-in auditor (tasks/
  # container_template_audit/main.py) already reports these, so leaving the
  # YAML copies on produced duplicate findings. Re-enable only if the built-in
  # checks are removed.

  - id: duplicate_template
    enabled: false
    severity: ERROR
    check: description_count
    keyword: "NPI Overview"
    threshold: 1
    message: "NPI template deployed {count} times — should be exactly 1."
    fix_hint: "Delete duplicate copies in description using Visual mode in Jira."

  - id: missing_imr
    enabled: true
    severity: WARNING
    check: description_field_empty
    field_label: "IMR / HIM number"
    message: "IMR/HIM number is empty — required for transport via DO."
    fix_hint: "Fill in IMR/HIM number in the NPI Overview table."

  - id: missing_cost_center
    enabled: true
    severity: WARNING
    check: description_field_empty
    field_label: "Cost center"
    message: "Cost center is empty in NPI Overview table."
    fix_hint: "Fill in the cost center to which this NPI run shall be billed."

  - id: missing_requestor_name
    enabled: true
    severity: WARNING
    check: description_field_empty
    field_label: "Name of Requestor"
    message: "Name of Requestor is empty in NPI Overview table."
    fix_hint: "Fill in the name of the person formally requesting the NPI in Jira."

  - id: missing_location
    enabled: false
    severity: ERROR
    check: jira_field_missing
    field_id: "customfield_13906"
    field_name: "NPI Location"
    message: "NPI Location not set."
    fix_hint: "Set NPI Location during the Request step."

  - id: missing_product_type
    enabled: false
    severity: ERROR
    check: jira_field_missing
    field_id: "customfield_13904"
    field_name: "Product Type"
    message: "Product Type not set."
    fix_hint: "Set Product Type during the Request step."

  - id: missing_order_type
    enabled: false
    severity: ERROR
    check: jira_field_missing
    field_id: "customfield_13905"
    field_name: "Order Type"
    message: "Order Type not set (DS/QS/PT/PR/DMR)."
    fix_hint: "Set Order Type during the Request step."

  # -------------------------------------------------------------------------
  # Container-setup rules added 2026-06-08 (from LiveKPI Overlay findings).
  # The wp_* checks operate on the container's child Work Packages, fetched
  # via relation() JQL. See AUDIT_RULES_README.md "Check Types" for details.
  # -------------------------------------------------------------------------

  - id: wrong_product_type
    enabled: true
    severity: ERROR
    check: jira_field_value_expected
    field_id: "customfield_13904"
    field_name: "Product Type"
    expected_value: "SMT PCBA"
    flag_if_empty: false          # emptiness is already caught by missing_product_type
    message: "Wrong Product Type: '{value}'. Expected 'SMT PCBA'. This causes the wrong template to be cloned. Container must be recreated."
    fix_hint: "Recreate the container with Product Type 'SMT PCBA' so the correct NPI template is cloned."

  # NOTE: a "wrong template clone" check (customfield_12401 vs a single
  # expected template) was intentionally dropped — SMT PCBA has several valid
  # templates (ITPL-1036, 769, 1027, ...), so the template ID is not a reliable
  # signal. wrong_product_type is the core check: a wrong clone shows up as the
  # wrong Product Type, which we catch directly above.

  # ---- WP-design rules (tuned 2026-06-08 against live data) ----------------
  # order_type_field + skip_order_types let a wp_* rule skip whole order types.
  # DMR containers do NOT follow the standard WP design, so every WP rule
  # skips them. order_type is read from customfield_13905 (prefix DS/QS/PT/
  # PR/DMR). "Direct Manufacturing Release" is NOT a standard WP and was
  # removed from the required set; "QM P+L" is only required for PR.

  - id: unrecognized_wps
    enabled: true
    severity: WARNING
    check: wp_unrecognized
    order_type_field: "customfield_13905"
    skip_order_types: ["DMR"]
    # Recognised whitelist — broad, so legitimate WPs are never flagged.
    standard_wps:
      - "Material"
      - "PCB"
      - "Routing - TechnPrep"
      - "PE - TechnPrep"
      - "TE - TechnPrep"
      - "SMT Build"
      - "QM P+L"
      - "Logistics"
      - "Documentation"
      - "Direct Manufacturing Release"
    message: "Unrecognized WP: '{wp_key}' summary '{wp_name}'. Not a standard NPI Work Package. May be from wrong template."
    fix_hint: "Confirm whether this WP belongs here. If it came from the wrong template, unlink or close it."

  - id: duplicate_wps
    enabled: true
    severity: WARNING
    check: wp_duplicate
    order_type_field: "customfield_13905"
    skip_order_types: ["DMR"]
    standard_wps:
      - "Material"
      - "PCB"
      - "Routing - TechnPrep"
      - "PE - TechnPrep"
      - "TE - TechnPrep"
      - "SMT Build"
      - "QM P+L"
      - "Logistics"
      - "Documentation"
      - "Direct Manufacturing Release"
    message: "Duplicate WP name '{wp_name}': {wp_key_1} (created {date1}) and {wp_key_2} (created {date2}). Usually from layering correct template on wrong one. Close the wrong one as Won't Do."
    fix_hint: "Keep one WP per standard name. Close the duplicate as Won't Do."

  - id: missing_standard_wps
    enabled: true
    severity: WARNING
    check: wp_missing_standard
    product_type_field: "customfield_13904"
    product_type_value: "SMT PCBA"   # only check containers of this product type
    order_type_field: "customfield_13905"
    skip_order_types: ["DMR"]         # DMR has its own (non-standard) WP design
    require_deployed: true            # batch: skip not-yet-deployed containers
                                      # (no child WPs / Backlog). A manual
                                      # check_container run audits them anyway.
    # Required for every non-DMR order type.
    standard_wps:
      - "Material"
      - "PCB"
      - "Routing - TechnPrep"
      - "PE - TechnPrep"
      - "TE - TechnPrep"
      - "SMT Build"
      - "Logistics"
      - "Documentation"
    # Extra WPs required only for specific order types.
    order_type_wps:
      PR:
        - "QM P+L"
    message: "Missing standard WPs: {list}. Template may be incomplete."
    fix_hint: "Add the missing standard NPI Work Packages, or confirm the template was deployed correctly."

  - id: cross_project_wps
    enabled: true
    severity: WARNING
    check: wp_cross_project
    order_type_field: "customfield_13905"
    skip_order_types: ["DMR"]
    message: "Cross-project WP: '{wp_key}' belongs to project '{wp_project}', but container is in '{wc_project}'. Likely carried over from a clone. Should be unlinked."
    fix_hint: "Unlink the cross-project WP — it was likely carried over from the source container during a clone."

  - id: skipped_wp_anchoring_npi_start
    enabled: true
    severity: WARNING
    check: wp_skipped_anchoring
    order_type_field: "customfield_13905"
    skip_order_types: ["DMR"]
    skipped_statuses:
      - "Won't Do"
      - "Wont Do"
      - "Cancelled"
      - "Canceled"
    message: "Skipped WP '{wp_key}' (Won't Do, created {date}) is earlier than earliest active WP ({active_date}). This inflates the container KPI. Close or unlink to fix."
    fix_hint: "Close or unlink the skipped WP so it stops anchoring NPI Start backwards and inflating the KPI."
