# ExpressOPS Automation Configuration
# Copy this to config.yaml and fill in your actual values.
# config.yaml is gitignored — NEVER commit it.

# Default run mode: mock (safe) or live
mode: mock

# JIRA On-Premises
# NPI Work Containers span many project keys (USRE, POSX, LCUSAMB, NPIOTHER,
# SILED2, ...) — queries filter by issue type + Order Type, not by project.
jira:
  base_url: "https://pfjira.pepperl-fuchs.com"
  pat: "YOUR_JIRA_PAT_HERE"
  verify_ssl: false

# Confluence
confluence:
  base_url: "https://pfteamspace.pepperl-fuchs.com"
  pat: "YOUR_CONFLUENCE_PAT_HERE"
  space_key: "EUDEMHTM0021"

# M3 ERP (ODBC)
m3:
  dsn: "ODSSG"
  schema: "PFODS"
  # Note: No timeout parameter supported for this DSN

# EDM Oracle
edm:
  # EDM requires running Python via EDMAdmin.exe
  # Set this to the path of your renamed python.exe
  python_exe: "C:\\Users\\tmoghanan\\EDMAdmin.exe"
  schema: "ADMEDP"
  # Connection string used by cx_Oracle / oracledb
  connection_string: "YOUR_EDM_CONNECTION_STRING"

# Tableau Server (REST API, PAT auth)
tableau:
  base_url: "https://pftableau.pepperl-fuchs.com"
  api_version: "3.25"
  pat_name: "Automation"
  pat_secret: "YOUR_TABLEAU_PAT_SECRET"
  content_url: ""          # default site
  verify_ssl: false

# Webex (Cisco public cloud — webexapis.com, independent of corp network)
# Used by mo_ref_order_monitor to notify build-progress groups.
webex:
  # Bot access token from developer.webex.com -> My Apps -> Create Bot.
  # Add the bot to each target space, then run discover_webex_rooms.py to get roomIds.
  bot_token: "YOUR_WEBEX_BOT_TOKEN"

# Anthropic API (for AI-powered analysis)
anthropic:
  api_key: "YOUR_ANTHROPIC_API_KEY"
  model: "claude-sonnet-4-20250514"

# Logging
logging:
  level: "INFO"
  log_dir: "logs"

# Existing Confluence page IDs (reference)
pages:
  mr_status_report: 560866215
  kpi_dashboard: 560871424
  to_status_check: 572178513
  bom_scanner: 572180443
  # Create a Confluence page for the MO-trigger staging table and put its
  # ID here so `--publish` knows where to write.
  mo_trigger_comment: 0

# MO-trigger comment assembler (tasks/mo_trigger_comment)
# Every person reference in the generated comment renders as a JIRA
# `[~username]` mention, which the wiki renderer expands to a linked
# display name on read. The config therefore stores JIRA *usernames*
# for anyone who should be mentioned; `display` fields are retained
# only as readable context and as a fallback for log messages.
mo_trigger_comment:
  addressee: "Ng Ker Cheng Hazel"           # greeting only ("Hi …,") — not a mention
  qm_default_username: ""                    # JIRA login for Chern JR Daniel (fill in)
  qm_default_display: "Chern JR Daniel"
  smt_line: "Line 5"
  mo_duration_days: 4
  default_fyi:
    - username: ""                           # JIRA login (fill in)
      display: "Moghanan Thinesh Neo Wei Siang"
    - username: ""
      display: "Teo Geok Hui"
    - username: ""
      display: "Sawabi Siti Aslinda"
    - username: ""
      display: "Jainutdeen Jahabar"
    - username: ""
      display: "Ng Ker Cheng Hazel"
  duplicate_marker: "#Ref: MO-Trigger#"

# Costing + HS Code trigger/reminder loop (tasks/costing_hs_code_trigger)
# Scheduled task: posts one comment tagging the 2 costing people + the HS Code
# person when a container is ready (DMR → immediately; others → 5 prerequisite
# WPs Done/Won't Do), then re-tags whoever is still outstanding every N working
# days until each replies with a done-keyword. Usernames are the JIRA logins
# used for [~username] mentions AND for detecting each person's "Done" reply —
# they MUST be filled in for the reminder loop to converge.
costing_hs_code_trigger:
  costing_people:
    - username: "kloo"                        # JIRA login (used for [~kloo] mention + done detection)
      display: "Loo King Lun"
    - username: "yuhuang"                      # JIRA login
      display: "Yu Huang"                      # display is cosmetic/log fallback — correct if wrong
  hs_code_person:
    username: "fpangilina"                     # JIRA login
    display: "F. Pangilina"                    # correct if wrong
  ready_resolutions: ["Done", "Acknowledged", "Won't Do"]  # prerequisite-WP resolutions that count as ready (matches mo_trigger_comment)
  # A person's track auto-closes when they reply with one of these keywords
  # (e.g. "The product costing is updated." matches "updated").
  done_keywords: ["done", "updated", "completed"]
  negation_guards: ["not done", "no update", "pending"]
  reminder_interval_working_days: 2
  trigger_marker: "#Ref: CostHS-Trigger#"    # hidden footer on the initial comment
  reminder_marker: "#Ref: CostHS-Reminder#"  # hidden footer on reminders
  messages:
    trigger: |
      {costing_mentions} Please update costing for all the PNs in the container, including the PN that is not running.
      {hs_mention} Please update HS code.

      Kindly reply on this ticket once the update is done.
    reminder: |
      Reminder — the following updates are still pending:
      {outstanding_lines}

      Kindly update and reply on this ticket once done.
